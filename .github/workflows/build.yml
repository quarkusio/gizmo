name: Gizmo 2 CI

on:
  push:
    branches-ignore:
      - 'dependabot/**'
    paths-ignore:
      - '.github/project.yml'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: "Build with JDK ${{ matrix.distribution }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        distribution: [temurin, semeru]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDKs
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: ${{ matrix.distribution }}
          java-version: |
            17
            21
            25
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -Dno-format -Djava17.home="${{env.JAVA_HOME_17_X64}}${{env.JAVA_HOME_17_ARM64}}" -Djava21.home="${{env.JAVA_HOME_21_X64}}${{env.JAVA_HOME_21_ARM64}}" -Djava25.home="${{env.JAVA_HOME_25_X64}}${{env.JAVA_HOME_25_ARM64}}"
